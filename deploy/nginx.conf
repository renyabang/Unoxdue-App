# UnoXdue — routing definitivo per il deploy esterno (Docker + Nginx).
# Regole:
#   - URL pubbliche pulite      -> SSR FastAPI (/api/seo/...), mappate SENZA slash finale
#   - /api/                     -> FastAPI
#   - /admin, /admin/*          -> React SPA (non indicizzata)
#   - asset del build React     -> filesystem
#   - /sitemap.xml, /robots.txt -> FastAPI
#   - QUALSIASI altra URL pubblica (anche inesistente) -> SSR catch-all del backend (404 HTML stilizzato)
#   - NESSUN fallback pubblico serve mai index.html della SPA React.
upstream unoxdue_backend {
    server backend:8001;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # ---- proxy headers riusati ----
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- API (^~ : priorita' sulle regex statiche, cosi' /api/static/*.css|woff2 va al backend) ----
    location ^~ /api/ {
        proxy_pass http://unoxdue_backend;
    }

    # ---- file SEO (serviti dal backend) ----
    location = /sitemap.xml { proxy_pass http://unoxdue_backend/api/sitemap.xml; }
    location = /video-sitemap.xml { proxy_pass http://unoxdue_backend/api/video-sitemap.xml; }
    location = /robots.txt { proxy_pass http://unoxdue_backend/api/robots.txt; }

    # ---- /live/ : redirect gestito dall'admin (destinazione del QR). Match esatti:
    #      in una location regex il proxy_pass non può avere URI statica. ----
    location = /live { proxy_pass http://unoxdue_backend/api/live; }
    location = /live/ { proxy_pass http://unoxdue_backend/api/live; }

    # ---- Admin (React SPA, non indicizzato). Refresh su route interne -> index.html ----
    location /admin {
        try_files $uri /index.html;
    }

    # ---- Asset statici del build React (/logo.jpg, /static/js|css, favicon, manifest, index.html...) ----
    location ~* \.(?:html|htm|js|mjs|css|jpg|jpeg|png|webp|gif|svg|ico|woff2?|ttf|eot|map|json)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # ---- Pagine pubbliche SSR (URL pulite -> backend, mappate SENZA slash finale) ----
    location = / { proxy_pass http://unoxdue_backend/api/seo/home; }
    location = /il-podcast/ { proxy_pass http://unoxdue_backend/api/seo/il-podcast; }
    location = /collaborazioni/ { proxy_pass http://unoxdue_backend/api/seo/collaborazioni; }
    location = /contatti/ { proxy_pass http://unoxdue_backend/api/seo/contatti; }
    location = /privacy/ { proxy_pass http://unoxdue_backend/api/seo/privacy; }
    location = /cookie/ { proxy_pass http://unoxdue_backend/api/seo/cookie; }
    location = /parlano-di-noi/ { proxy_pass http://unoxdue_backend/api/seo/parlano-di-noi; }

    location = /episodi/ { proxy_pass http://unoxdue_backend/api/seo/episodi; }
    location ~ ^/episodi/([^/]+)/trascrizione/?$ { proxy_pass http://unoxdue_backend/api/seo/episodi/$1/trascrizione; }
    location ~ ^/episodi/([^/]+)/?$ { proxy_pass http://unoxdue_backend/api/seo/episodi/$1; }

    location = /interviste/ { proxy_pass http://unoxdue_backend/api/seo/interviste; }
    location ~ ^/interviste/([^/]+)/trascrizione/?$ { proxy_pass http://unoxdue_backend/api/seo/interviste/$1/trascrizione; }
    location ~ ^/interviste/([^/]+)/?$ { proxy_pass http://unoxdue_backend/api/seo/interviste/$1; }

    location = /pronostici/ { proxy_pass http://unoxdue_backend/api/seo/pronostici; }
    location ~ ^/pronostici/serie-a/([^/]+)/giornata-([0-9]+)/?$ {
        proxy_pass http://unoxdue_backend/api/seo/pronostici/serie-a/$1/giornata-$2;
    }

    location = /team/ { proxy_pass http://unoxdue_backend/api/seo/team; }
    location ~ ^/team/([^/]+)/?$ { proxy_pass http://unoxdue_backend/api/seo/team/$1; }

    # ---- Fallback PUBBLICO: ogni altra URL pulita -> SSR catch-all del backend.
    #      Il backend restituisce la pagina 404 HTML stilizzata (noindex). MAI la SPA React. ----
    location / {
        proxy_pass http://unoxdue_backend/api/seo$request_uri;
    }
}
