# UnoXdue — routing definitivo per il deploy esterno.
# URL pubbliche pulite -> SSR FastAPI ; /admin -> React SPA ; /api -> FastAPI.
upstream unoxdue_backend {
    server backend:8001;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # ---- proxy headers reused ----
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- API (^~ : ha priorita' sulle regex statiche, cosi' /api/static/*.css|woff2 va al backend) ----
    location ^~ /api/ {
        proxy_pass http://unoxdue_backend;
    }

    # ---- file SEO ----
    location = /sitemap.xml { proxy_pass http://unoxdue_backend/api/sitemap.xml; }
    location = /video-sitemap.xml { proxy_pass http://unoxdue_backend/api/video-sitemap.xml; }
    location = /robots.txt { proxy_pass http://unoxdue_backend/api/robots.txt; }

    # ---- /live/ : redirect gestito dall'admin (destinazione del QR) ----
    location ~ ^/live/?$ { proxy_pass http://unoxdue_backend/api/live; }

    # ---- Admin (React SPA, non indicizzato) ----
    location /admin {
        try_files $uri /index.html;
    }

    # ---- Asset statici (inclusi /logo.jpg, /hosts/*.jpg, /team/*.jpg, JS/CSS) ----
    location ~* \.(?:js|mjs|css|jpg|jpeg|png|webp|gif|svg|ico|woff2?|ttf|eot|map|json)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # ---- Pagine pubbliche SSR (URL pulite) ----
    location = / { proxy_pass http://unoxdue_backend/api/seo/home; }
    location = /il-podcast/ { proxy_pass http://unoxdue_backend/api/seo/il-podcast; }
    location = /parlano-di-noi/ { proxy_pass http://unoxdue_backend/api/seo/parlano-di-noi; }

    location = /episodi/ { proxy_pass http://unoxdue_backend/api/seo/episodi; }
    location ~ ^/episodi/([^/]+)/?$ { proxy_pass http://unoxdue_backend/api/seo/episodi/$1; }

    location = /interviste/ { proxy_pass http://unoxdue_backend/api/seo/interviste; }
    location ~ ^/interviste/([^/]+)/?$ { proxy_pass http://unoxdue_backend/api/seo/interviste/$1; }

    location = /pronostici/ { proxy_pass http://unoxdue_backend/api/seo/pronostici; }
    location ~ ^/pronostici/serie-a/([^/]+)/giornata-([0-9]+)/?$ {
        proxy_pass http://unoxdue_backend/api/seo/pronostici/serie-a/$1/giornata-$2;
    }

    location = /team/ { proxy_pass http://unoxdue_backend/api/seo/team; }
    location ~ ^/team/([^/]+)/?$ { proxy_pass http://unoxdue_backend/api/seo/team/$1; }

    # ---- fallback ----
    location / {
        try_files $uri /index.html;
    }
}
